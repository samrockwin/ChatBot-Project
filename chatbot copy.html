<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
     

    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

function ChatInput ({chatMessages, setChatMessages}){
    const [inputText, setInputText] = React.useState('') 
    function saveText(event){
       setInputText(event.target.value)
       
    }
    function escape(event){
       if(event.key === 'Escape'){
        setInputText('')
    }
  }
    function handleKeyDown(event) {
    if (event.key === 'Enter') {
      sendmessage();
    }
  }
    function sendmessage(){
      const newMessage=[...chatMessages, {
        message: inputText,
        sender: 'user',
        id: crypto.randomUUID()
      }
      ]
      setChatMessages(newMessage)
      const response = Chatbot.getResponse(inputText)
      
      
      
      setInputText('')
    
      setChatMessages([...newMessage,
       {
        message: response,
        sender: 'robot',
        id: crypto.randomUUID()
      }
      
      ])
 
    }

    return(
      <>
        <input placeholder ="send message to chatbot" size="30"onKeyDown ={handleKeyDown} onKeyUp={escape} onChange={saveText} value={inputText} />
        <button onClick={sendmessage}>send</button>
        </>
    )
}

      function ChatMessage(props){
       
        const { message, sender } = props; // receive props

/*
        if(sender === 'robot'){
          return(
          <div>
            <img src="robot.png" width="50" />
            {message} 
          </div>
          );
        }
*/
        return (
          <div>     
            {sender === 'robot' && <img src="robot.png" width="50" />}
            {message}
            {sender ==='user' && <img src="user.png" width="50" />}
          </div>
        );
      }

      function ChatMessages({chatMessages} ){
     
       
        return(
          <>
          {chatMessages.map((getFromChatMessages)=>{
          return (
            <ChatMessage
            message = {getFromChatMessages.message}
            sender = {getFromChatMessages.sender}
            key = {getFromChatMessages.id}
            />
          );
        })}
        </>
      )
      }


    function App(){
      const [chatMessages, setChatMessages] = React.useState ([{
          message: 'hello chatbot',
          sender: 'user',
          id: 'id1'
        },{
          message: 'Hello! How can I help you?',
          sender: 'robot',
          id: 'id2'
        },{
          message: 'can you get me todays date?',
          sender: 'user',
          id: 'id3'
        },{
          message: `${dayjs().format('dddd, MMMM D, YYYY')}`,
          sender: 'robot',
          id: 'id4'
        }]);
        
        return(
          <>
          <ChatInput 
          chatMessages = {chatMessages}
          setChatMessages = {setChatMessages} />
          <ChatMessages 
          chatMessages = {chatMessages} />
          </>
        )

     }
    
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);


    </script>
  </body>
</html>
